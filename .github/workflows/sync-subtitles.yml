name: Sync Subtitles
run-name: "Sync: ${{ github.event.pull_request.title }}"

on:
  pull_request:
    branches: [main]
    paths:
      - 'talks/*/transcript_uk.txt'
      - 'talks/*/*/final/uk.srt'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt

      # tools.sync_pr walks `git diff --name-only $BASE HEAD`, runs the
      # two-pass SRT↔transcript sync (with per-video effective-old
      # baselines for mixed PRs), optimizes, validates, and writes
      # everything back into the working tree. Exits non-zero on any
      # sync/optimize/validate failure, emitting ::error:: annotations.
      # We capture the exit code so that partial progress still gets
      # committed before we fail the job.
      - name: Sync, optimize, validate
        id: sync
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set +e
          python -m tools.sync_pr --base-sha "$BASE_SHA"
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add talks/*/*/final/uk.srt talks/*/transcript_uk.txt
          git diff --cached --quiet && { echo "No changes to commit"; exit 0; }
          git commit -m "Sync subtitles and transcript edits"
          git push

      - name: Fail if sync had errors
        if: always()
        run: |
          if [ "${{ steps.sync.outputs.exit_code }}" != "0" ]; then
            echo "::error::Some subtitles could not be synced automatically. See earlier log lines."
            exit 1
          fi
