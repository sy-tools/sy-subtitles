name: Subtitle Pipeline
run-name: "${{ inputs.talk_id || 'auto' }} | ${{ inputs.whisper != false && 'whisper' || '' }}${{ inputs.translate != false && ' translate' || '' }}${{ inputs.review != false && ' review' || '' }}${{ inputs.build != false && ' build' || '' }}${{ inputs.timing_source == 'en-srt' && ' (en-srt)' || '' }}"

on:
  push:
    branches: [main]
    paths:
      # - 'talks/*/transcript_en.txt'  # temporarily disabled while re-downloading transcripts
      - 'talks/*/transcript_en.txt.DISABLED'
  workflow_dispatch:
    inputs:
      talk_id:
        description: 'Talk directory name (e.g., 1993-09-19_Ganesha-Puja-Cabella)'
        required: true
        type: string
      whisper:
        description: 'Run whisper step'
        type: boolean
        default: true
      translate:
        description: 'Run translate step'
        type: boolean
        default: true
      review:
        description: 'Run review step'
        type: boolean
        default: true
      build:
        description: 'Run build step (subtitle builder agent)'
        type: boolean
        default: true
      timing_source:
        description: 'Timing source for builder: auto (en-srt if en.srt present, else whisper), whisper, or en-srt'
        type: choice
        options:
          - auto
          - whisper
          - en-srt
        default: auto
      dry_run:
        description: 'Replay fake LLM responses from snapshots, skip commit'
        type: boolean
        default: false
  workflow_call:
    inputs:
      talk_id:
        required: true
        type: string
      whisper:
        type: boolean
        default: true
      translate:
        type: boolean
        default: true
      review:
        type: boolean
        default: true
      build:
        type: boolean
        default: true
      timing_source:
        type: string
        default: auto
      dry_run:
        type: boolean
        default: false
      dry_run_tag:
        description: 'Unique suffix appended to artifact names when called from a matrix driver'
        type: string
        default: ''

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

env:
  MODEL_HEAVY: claude-opus-4-8
  MODEL_LIGHT: claude-sonnet-4-6

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.find.outputs.matrix }}
      talk_matrix: ${{ steps.find.outputs.talk_matrix }}
      whisper_matrix: ${{ steps.find.outputs.whisper_matrix }}
      needs_whisper: ${{ steps.find.outputs.needs_whisper }}
      # Normalized (whitespace-stripped) talk_id — the single source of truth
      # for downstream artifact names/paths. Using raw inputs.talk_id there let
      # a stray space diverge upload names (built from the stripped
      # matrix.talk_id) from download names and break commit ("Artifact not
      # found"). Empty when the run was triggered without a talk_id input.
      talk_id: ${{ steps.find.outputs.talk_id }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Find talks, videos, and pending whisper
        id: find
        env:
          INPUT_TALK_ID: ${{ inputs.talk_id }}
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess, yaml

          from tools.workflow_validation import (
              InvalidWorkflowInput,
              die,
              validate_talk_id,
              validate_video_slug,
          )

          raw_talk_id = os.environ.get("INPUT_TALK_ID", "")
          talk_id_input = raw_talk_id.strip()
          if talk_id_input and raw_talk_id != talk_id_input:
              print(
                  "::warning::talk_id had surrounding whitespace; "
                  f"normalized to {talk_id_input!r}"
              )
          if talk_id_input:
              try:
                  validate_talk_id(talk_id_input)
              except InvalidWorkflowInput as e:
                  die(str(e))
          video_includes = []
          talk_ids = set()
          whisper_talk_ids = set()

          def process_talk(talk_id):
              try:
                  validate_talk_id(talk_id)
              except InvalidWorkflowInput as e:
                  die(str(e))
              meta_path = f"talks/{talk_id}/meta.yaml"
              if not os.path.isfile(meta_path):
                  print(f"SKIP: {meta_path} not found")
                  return
              talk_ids.add(talk_id)
              with open(meta_path) as f:
                  meta = yaml.safe_load(f)
              slugs_seen = set()
              for v in meta.get("videos", []):
                  slug = v["slug"]
                  try:
                      validate_video_slug(slug)
                  except InvalidWorkflowInput as e:
                      die(f"{meta_path}: {e}")
                  if slug in slugs_seen:
                      print(f"::warning::duplicate slug '{slug}' in {meta_path}")
                  slugs_seen.add(slug)
                  video_includes.append({"talk_id": talk_id, "video_slug": slug})
                  whisper_path = f"talks/{talk_id}/{slug}/source/whisper.json"
                  if not os.path.isfile(whisper_path):
                      whisper_talk_ids.add(talk_id)
                      print(f"WHISPER NEEDED: {talk_id}/{slug}")
                  else:
                      print(f"READY: {talk_id}/{slug}")

          if talk_id_input:
              process_talk(talk_id_input)
          else:
              result = subprocess.run(
                  ["git", "diff", "--name-only", "HEAD~1", "HEAD"],
                  capture_output=True, text=True
              )
              for line in result.stdout.strip().split("\n"):
                  if "transcript_en.txt" in line:
                      parts = line.split("/")
                      if len(parts) >= 2:
                          process_talk(parts[1])

          matrix = json.dumps({"include": video_includes})
          talk_matrix = json.dumps({"include": [{"talk_id": t} for t in sorted(talk_ids)]})
          whisper_matrix = json.dumps({"include": [{"talk_id": t} for t in sorted(whisper_talk_ids)]})
          needs_whisper = "true" if whisper_talk_ids else "false"

          print(f"\nTalks: {len(talk_ids)}, Videos: {len(video_includes)}, Talks needing whisper: {len(whisper_talk_ids)}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={matrix}\n")
              f.write(f"talk_matrix={talk_matrix}\n")
              f.write(f"whisper_matrix={whisper_matrix}\n")
              f.write(f"needs_whisper={needs_whisper}\n")
              f.write(f"talk_id={talk_id_input}\n")
          PYEOF

  # Run Whisper for talks that don't have whisper.json yet
  whisper:
    needs: discover
    if: inputs.whisper != false && needs.discover.outputs.needs_whisper == 'true'
    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.whisper_matrix) }}
      fail-fast: false
    uses: ./.github/workflows/whisper.yml
    with:
      talk_id: ${{ matrix.talk_id }}

  # Translate EN→UK and review with 2+1 process (per talk)
  translate-and-review:
    needs: discover
    if: inputs.translate != false || inputs.review != false
    environment: ${{ inputs.dry_run && 'dry-run' || 'main' }}
    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.talk_matrix) }}
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2

      - name: Cache Claude Code
        uses: actions/cache@v5
        with:
          path: |
            ~/.claude-code
            ~/.local/share/claude-code
          key: claude-code-${{ runner.os }}

      - name: Install Claude Code
        run: bun install -g @anthropic-ai/claude-code@latest

      - name: Resolve executable paths
        id: tools
        run: |
          echo "bun=$(which bun)" >> "$GITHUB_OUTPUT"
          echo "claude=$(which claude)" >> "$GITHUB_OUTPUT"

      - name: Translate (dry-run fake)
        if: inputs.translate != false && inputs.dry_run == true
        env:
          TALK_ID: ${{ matrix.talk_id }}
        run: |
          # Snapshot has transcript_uk.txt at the video level; any video in
          # the talk will do (they all share the talk-level transcript).
          snap=$(ls -d tests/fixtures/pipeline_snapshots/"${TALK_ID}"/*/ 2>/dev/null | head -1)
          if [ -z "$snap" ]; then
            echo "::error::no snapshot for ${TALK_ID}"; exit 1
          fi
          python -m tools.fake_llm translate --snapshot "${snap%/}" --talk-dir "talks/${TALK_ID}"

      - name: Translate to Ukrainian
        if: inputs.translate != false && inputs.dry_run != true
        uses: anthropics/claude-code-action@d5726de019ec4498aa667642bc3a80fca83aa102  # v1.0.148
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          path_to_bun_executable: ${{ steps.tools.outputs.bun }}
          path_to_claude_code_executable: ${{ steps.tools.outputs.claude }}
          claude_args: "--max-turns 80 --dangerously-skip-permissions --effort xhigh --model ${{ env.MODEL_HEAVY }}"
          show_full_output: true
          prompt: |
            You are translating a Sahaja Yoga lecture from English to Ukrainian.

            REQUIRED READING – read these files before translating:
            1. glossary/CLAUDE.md – transliteration conventions, capitalization rules
            2. glossary/terms_lookup.yaml – EN→UK term dictionary (374 terms)
            3. glossary/terms_context.yaml – disambiguation context for ambiguous terms
            4. glossary/chakra_map.yaml – chakra/deity/channel mapping
            5. talks/${{ matrix.talk_id }}/transcript_en.txt – English source transcript
            (CLAUDE.md is auto-loaded – no need to read it)

            TASK:
            Translate the full English transcript into Ukrainian and write it to:
              talks/${{ matrix.talk_id }}/transcript_uk.txt

            RULES:
            - Translate the header lines too (date, title, location, language line)
            - Header format: translate date to Ukrainian, translate title and location, last header line must start with "Мова промови:"
              Example: "Talk Language: English | Transcript (English) – VERIFIED"
                     → "Мова промови: англійська | Транскрипт (українська)"
            - Separate header from body with one blank line
            - Preserve paragraph structure: one EN paragraph = one UK paragraph
            - One paragraph per line (single \n between paragraphs)
            - Follow ALL language rules from CLAUDE.md
            - Use glossary terms consistently (terms_lookup.yaml + terms_context.yaml)
            - Follow transliteration conventions from glossary/CLAUDE.md (ґ not г for Sanskrit g, дх for dh, і for short i)
            - Translate with devotion, precision, and respect for the sacred meaning

            READING STRATEGY:
            Read the entire transcript_en.txt in ONE Read call (do not use sed/head/tail to read in pieces).
            Read all glossary files in parallel in one turn.

            WRITING STRATEGY (important – the transcript is too large for a single Write):
            Write the translation in LARGE chunks of ~15-20 KB each using bash:
            ```bash
            # First chunk – create file (aim for ~20-30 paragraphs per chunk)
            cat > talks/${{ matrix.talk_id }}/transcript_uk.txt << 'UKEOF'
            Перший абзац...
            ...багато абзаців...
            UKEOF

            # Next chunks – APPEND
            cat >> talks/${{ matrix.talk_id }}/transcript_uk.txt << 'UKEOF'
            Наступний абзац...
            ...багато абзаців...
            UKEOF
            ```
            Use 3-5 chunks TOTAL for the whole file. Do NOT write small chunks of 5-10 lines.
            Do not summarize, abbreviate, or skip any paragraphs.
            After writing, verify paragraph count matches EN (grep -c '^.' on both files).
            If counts differ – you MUST fix the translation before finishing.
            Every EN paragraph must correspond to exactly one UK paragraph, in the same order.
            Do not merge multiple EN paragraphs into one UK paragraph.
            Do not split one EN paragraph into multiple UK paragraphs.
            Do not use TodoWrite – this runs in CI, no one sees progress updates.

      - name: Verify translation
        run: |
          TALK="talks/${{ matrix.talk_id }}"
          UK="$TALK/transcript_uk.txt"
          EN="$TALK/transcript_en.txt"

          if [ ! -f "$UK" ]; then
            echo "::error::transcript_uk.txt was not created by translate step"
            exit 1
          fi

          EN_COUNT=$(python3 -c "
          from tools.align_uk import load_transcript
          print(len(load_transcript('$EN')))
          ")
          UK_COUNT=$(python3 -c "
          from tools.align_uk import load_transcript
          print(len(load_transcript('$UK')))
          ")

          echo "EN paragraphs: $EN_COUNT"
          echo "UK paragraphs: $UK_COUNT"
          echo "UK file size: $(wc -c < "$UK") bytes"

          if [ "$EN_COUNT" != "$UK_COUNT" ]; then
            echo "::error::Paragraph count mismatch! EN=$EN_COUNT UK=$UK_COUNT. Translator must preserve 1:1 paragraph mapping."
            exit 1
          fi

          echo "Paragraph counts match: $EN_COUNT"

      - name: Review (dry-run fake)
        if: inputs.review != false && inputs.dry_run == true
        env:
          TALK_ID: ${{ matrix.talk_id }}
        run: |
          snap=$(ls -d tests/fixtures/pipeline_snapshots/"${TALK_ID}"/*/ 2>/dev/null | head -1)
          if [ -z "$snap" ]; then
            echo "::error::no snapshot for ${TALK_ID}"; exit 1
          fi
          python -m tools.fake_llm review --snapshot "${snap%/}" --talk-dir "talks/${TALK_ID}"

      - name: Review translation (2+1)
        if: inputs.review != false && inputs.dry_run != true
        uses: anthropics/claude-code-action@d5726de019ec4498aa667642bc3a80fca83aa102  # v1.0.148
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          path_to_bun_executable: ${{ steps.tools.outputs.bun }}
          path_to_claude_code_executable: ${{ steps.tools.outputs.claude }}
          claude_args: "--max-turns 60 --dangerously-skip-permissions --effort xhigh --model ${{ env.MODEL_HEAVY }}"
          show_full_output: true
          prompt: |
            Perform a 2+1 language review on the Ukrainian translation.

            READ these files:
            1. talks/${{ matrix.talk_id }}/transcript_uk.txt – the translation to review
            2. talks/${{ matrix.talk_id }}/transcript_en.txt – English original for reference
            3. templates/language_review_template.md – review process and table format
            4. glossary/CLAUDE.md – SY terminology and capitalization rules
            5. glossary/terms_lookup.yaml – term dictionary
            6. glossary/terms_context.yaml – disambiguation context
            (CLAUDE.md is auto-loaded – no need to read it)

            PROCESS (follow templates/language_review_template.md):

            Step 1 – Reviewer L (Language):
            Check orthography, grammar, punctuation:
            - Spelling, incorrect word forms, mixed Latin/Cyrillic characters
            - Comma usage, quotation marks «», em-dash ` – `, ellipsis `...`
            - Case forms, verb conjugations, gender agreement
            - Missing/extra spaces around punctuation

            Step 2 – Reviewer S (SY Domain):
            Check terminology and capitalization:
            - Deity pronoun capitalization per CLAUDE.md rules
            - Glossary term consistency against terms_lookup.yaml
            - SY terminology accuracy
            - Language names lowercase in Ukrainian
            - Spiritual term capitalization (Дхарма, Інкарнація, Пуджа, Дух, Істина, Стопи)

            Step 3 – Critic:
            Review ALL corrections from L and S:
            - Remove false positives (where original was correct)
            - Remove trivial style preferences (not real errors)
            - Keep only genuine errors with clear justification
            - Resolve conflicts between L and S suggestions

            Step 4 – Apply:
            Apply all Critic-approved corrections to talks/${{ matrix.talk_id }}/transcript_uk.txt
            Save the full review report (with all tables) to talks/${{ matrix.talk_id }}/review_report.md

            Be thorough but precise. Only change what genuinely needs correction.
            Do not use TodoWrite – this runs in CI, no one sees progress updates.

      - name: Record glossary version
        if: "!cancelled()"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TALK_DIR="talks/${{ matrix.talk_id }}"
          GTAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "pre-release")
          python3 -c "
          import json
          from pathlib import Path
          p = Path('$TALK_DIR/glossary.json')
          data = json.loads(p.read_text()) if p.exists() else {}
          data['translated_with'] = '$GTAG'
          data['reviewed_with'] = '$GTAG'
          p.write_text(json.dumps(data, indent=2, ensure_ascii=False) + '\n')
          print(f'Glossary version: $GTAG')
          "

      - name: Upload translation artifacts
        if: "!cancelled()"
        uses: actions/upload-artifact@v7
        with:
          retention-days: 7
          name: translation__${{ matrix.talk_id }}${{ inputs.dry_run_tag }}
          if-no-files-found: warn
          path: |
            talks/${{ matrix.talk_id }}/transcript_uk.txt
            talks/${{ matrix.talk_id }}/review_report.md
            talks/${{ matrix.talk_id }}/glossary.json

  # --- Build subtitles: 2-phase pipeline (prepare + single Opus 4.8 pass) ---

  # Phase 1: Split UK text into subtitle blocks
  prepare-build:
    needs: [discover, whisper, translate-and-review]
    if: |
      always() &&
      !cancelled() &&
      inputs.build != false &&
      needs.discover.result == 'success' &&
      (needs.translate-and-review.result == 'success' || needs.translate-and-review.result == 'skipped') &&
      (needs.whisper.result == 'success' || needs.whisper.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      talk_id: ${{ steps.prepare.outputs.talk_id }}
      video_slug: ${{ steps.prepare.outputs.video_slug }}
      timing_source: ${{ steps.timing.outputs.timing_source }}
    steps:
      - uses: actions/checkout@v6
      - run: git pull --rebase

      - name: Download translation artifacts
        if: needs.translate-and-review.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: translation__${{ needs.discover.outputs.talk_id }}${{ inputs.dry_run_tag }}
          path: translation__${{ needs.discover.outputs.talk_id }}${{ inputs.dry_run_tag }}

      - name: Place translation artifacts
        if: needs.translate-and-review.result == 'success'
        env:
          TALK_ID: ${{ needs.discover.outputs.talk_id }}
        run: |
          echo "=== Artifact directories ==="
          ls -la translation__*/ 2>/dev/null || echo "No translation__* dirs found"
          find . -maxdepth 3 -name "transcript_uk.txt" 2>/dev/null || true

          # Prepare-build only processes ONE talk at a time, so copy the
          # contents of whichever translation__* directory is present.
          for dir in translation__*/; do
            [ -d "$dir" ] || continue
            echo "Processing: $(basename "$dir")"
            for f in transcript_uk.txt review_report.md glossary.json; do
              src=$(find "$dir" -name "$f" -type f | head -1)
              if [ -n "$src" ]; then
                cp "$src" "talks/${TALK_ID}/$f"
                echo "  -> talks/${TALK_ID}/$f"
              fi
            done
          done

          # Fallback: check if files were extracted flat
          if [ ! -f "talks/${TALK_ID}/transcript_uk.txt" ]; then
            echo "=== Fallback: searching workspace ==="
            src=$(find . -name "transcript_uk.txt" -not -path "./talks/*" -type f | head -1)
            if [ -n "$src" ]; then
              cp "$src" "talks/${TALK_ID}/transcript_uk.txt"
              echo "  -> (fallback) talks/${TALK_ID}/transcript_uk.txt"
            fi
          fi

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt

      - name: Prepare UK blocks
        id: prepare
        run: |
          TALK_ID="${{ needs.discover.outputs.talk_id }}"
          TALK="talks/$TALK_ID"

          # Find video with most spoken words (not longest duration — puja videos are long but silent)
          FIRST_VIDEO=$(python3 -c "
          import json, yaml, sys
          with open('$TALK/meta.yaml') as f:
            meta = yaml.safe_load(f)
          best_slug, best_words = None, 0
          for v in meta['videos']:
            wpath = f'$TALK/{v[\"slug\"]}/source/whisper.json'
            try:
              with open(wpath) as wf:
                segs = json.load(wf)['segments']
              nwords = sum(len(s.get('words', [])) for s in segs)
            except: nwords = 0
            print(f'  {v[\"slug\"]}: {nwords} words', file=sys.stderr)
            if nwords > best_words:
              best_words = nwords
              best_slug = v['slug']
          if best_slug is None:
            best_slug = meta['videos'][0]['slug']
            print(f'WARNING: no whisper.json found, using first video: {best_slug}', file=sys.stderr)
          print(best_slug)
          ")

          echo "talk_id=$TALK_ID" >> "$GITHUB_OUTPUT"
          echo "video_slug=$FIRST_VIDEO" >> "$GITHUB_OUTPUT"

          python -m tools.build_map prepare \
            --talk-dir "$TALK" \
            --video-slug "$FIRST_VIDEO" > /dev/null

      - name: Resolve timing source
        id: timing
        env:
          TIMING_SOURCE_INPUT: ${{ inputs.timing_source }}
          TALK_ID: ${{ steps.prepare.outputs.talk_id }}
          VIDEO_SLUG: ${{ steps.prepare.outputs.video_slug }}
        run: |
          if [ "$TIMING_SOURCE_INPUT" = "auto" ] || [ -z "$TIMING_SOURCE_INPUT" ]; then
            if [ -f "talks/${TALK_ID}/${VIDEO_SLUG}/source/en.srt" ]; then
              RESOLVED=en-srt
            else
              RESOLVED=whisper
            fi
            echo "auto → $RESOLVED (en.srt $( [ "$RESOLVED" = "en-srt" ] && echo present || echo missing ))"
          else
            RESOLVED="$TIMING_SOURCE_INPUT"
            echo "explicit → $RESOLVED"
          fi
          echo "timing_source=$RESOLVED" >> "$GITHUB_OUTPUT"

      - name: Upload UK blocks
        uses: actions/upload-artifact@v7
        with:
          retention-days: 7
          name: chunks__${{ needs.discover.outputs.talk_id }}${{ inputs.dry_run_tag }}
          path: |
            talks/${{ needs.discover.outputs.talk_id }}/*/work/uk_blocks.json

  # Phase 2: Single Opus 4.8 pass — assign timecodes, build SRT
  build-timecodes:
    needs: prepare-build
    if: ${{ !cancelled() && needs.prepare-build.result == 'success' }}
    environment: ${{ inputs.dry_run && 'dry-run' || 'main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: git pull --rebase

      - name: Download UK blocks artifact
        uses: actions/download-artifact@v8
        with:
          name: chunks__${{ needs.prepare-build.outputs.talk_id }}${{ inputs.dry_run_tag }}
          path: talks/${{ needs.prepare-build.outputs.talk_id }}

      - name: Place UK blocks into work dir
        env:
          TALK_ID: ${{ needs.prepare-build.outputs.talk_id }}
          VIDEO_SLUG: ${{ needs.prepare-build.outputs.video_slug }}
        run: |
          WORK="talks/${TALK_ID}/${VIDEO_SLUG}/work"
          mkdir -p "$WORK"
          [ -f "talks/${TALK_ID}/uk_blocks.json" ] && mv "talks/${TALK_ID}/uk_blocks.json" "$WORK/" || true
          [ -f "$WORK/uk_blocks.json" ] && echo "uk_blocks.json ready" || echo "::warning::uk_blocks.json not found"

      - name: Download translation artifacts
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: translation__${{ needs.prepare-build.outputs.talk_id }}${{ inputs.dry_run_tag }}
          path: translation__${{ needs.prepare-build.outputs.talk_id }}${{ inputs.dry_run_tag }}

      - name: Place translation artifacts
        env:
          TALK_ID: ${{ needs.prepare-build.outputs.talk_id }}
        run: |
          placed=0
          for dir in translation__*/; do
            [ -d "$dir" ] || continue
            for f in transcript_uk.txt review_report.md glossary.json; do
              if [ -f "$dir/$f" ]; then
                cp "$dir/$f" "talks/${TALK_ID}/$f"
                echo "Placed: talks/${TALK_ID}/$f"
                placed=$((placed + 1))
              fi
            done
          done
          if [ "$placed" -eq 0 ] && [ -f "transcript_uk.txt" ]; then
            for f in transcript_uk.txt review_report.md glossary.json; do
              [ -f "$f" ] && cp "$f" "talks/${TALK_ID}/$f"
            done
          fi

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt

      - name: Prepare timing data
        env:
          TALK_ID: ${{ needs.prepare-build.outputs.talk_id }}
          VIDEO_SLUG: ${{ needs.prepare-build.outputs.video_slug }}
          TIMING_SOURCE: ${{ needs.prepare-build.outputs.timing_source }}
        run: |
          python -m tools.build_map prepare-timing             --talk-dir "talks/${TALK_ID}"             --video-slug "${VIDEO_SLUG}"             --timing-source "${TIMING_SOURCE}"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
      - name: Cache Claude Code
        uses: actions/cache@v5
        with:
          path: |
            ~/.claude-code
            ~/.local/share/claude-code
          key: claude-code-${{ runner.os }}
      - name: Install Claude Code
        run: bun install -g @anthropic-ai/claude-code@latest
      - name: Resolve executable paths
        id: tools
        run: |
          echo "bun=$(which bun)" >> "$GITHUB_OUTPUT"
          echo "claude=$(which claude)" >> "$GITHUB_OUTPUT"

      - name: Build timecodes (dry-run fake)
        if: inputs.dry_run == true
        env:
          TALK_ID: ${{ needs.prepare-build.outputs.talk_id }}
          VIDEO_SLUG: ${{ needs.prepare-build.outputs.video_slug }}
        run: |
          python -m tools.fake_llm build-timecodes \
            --snapshot "tests/fixtures/pipeline_snapshots/${TALK_ID}/${VIDEO_SLUG}" \
            --work-dir "talks/${TALK_ID}/${VIDEO_SLUG}/work"

      - name: Build timecodes (Opus 4.8)
        if: inputs.dry_run != true
        uses: anthropics/claude-code-action@d5726de019ec4498aa667642bc3a80fca83aa102  # v1.0.148
        env:
          CLAUDE_CODE_MAX_OUTPUT_TOKENS: "128000"
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          path_to_bun_executable: ${{ steps.tools.outputs.bun }}
          path_to_claude_code_executable: ${{ steps.tools.outputs.claude }}
          claude_args: "--max-turns 80 --dangerously-skip-permissions --effort high --model ${{ env.MODEL_HEAVY }}"
          show_full_output: true
          prompt: |
            Assign timecodes to Ukrainian subtitle blocks.

            TALK: talks/${{ needs.prepare-build.outputs.talk_id }}
            VIDEO: ${{ needs.prepare-build.outputs.video_slug }}
            TIMING SOURCE: ${{ needs.prepare-build.outputs.timing_source }}

            Step 1 — Read:
            - UK blocks: talks/${{ needs.prepare-build.outputs.talk_id }}/${{ needs.prepare-build.outputs.video_slug }}/work/uk_blocks.json
            - Timing:    talks/${{ needs.prepare-build.outputs.talk_id }}/${{ needs.prepare-build.outputs.video_slug }}/work/timing.json
            - Context:   talks/${{ needs.prepare-build.outputs.talk_id }}/transcript_en.txt

            timing.json format:
              whisper → {"source":"whisper","words":[{"w":word,"s":start_ms,"e":end_ms},...]}
              en-srt  → {"source":"en-srt","blocks":[{"n":idx,"s":start_ms,"e":end_ms,"t":text},...]}

            Step 2 — For each block in uk_blocks.json, determine start and end timecodes.

            WHISPER mode:
              - Understand the meaning of the Ukrainian block text
              - Locate the matching words in the English speech (use transcript_en.txt for context)
              - Find those words in timing.json, use "s" of first match as start and "e" of last as end
              - Convert ms to HH:MM:SS,mmm

            EN-SRT mode:
              - Match each UK block to the EN SRT block(s) with the same meaning
              - 1 UK = 1 EN: copy "s" and "e"
              - 1 UK = N EN: start = "s" of first, end = "e" of last
              - N UK = 1 EN: split the EN block time range proportionally
              - UK blocks that have NO counterpart in any EN SRT block MUST be SKIPPED — do not emit a timecode line for them. This includes:
                • editorial closing signatures (e.g. "H.H. Shri Mataji Nirmala Devi" / "Її Святість Шрі Матаджі Нірмала Деві")
                • parenthetical stage directions that describe audio not present in EN SRT (e.g. "(Just speaking about details of flight.)")
                • any trailing transcript paragraphs past the last EN SRT block
              - The EN SRT is the ground truth for what is subtitled; transcript-only content must not leak into the output.

            Step 3 — Write to:
            talks/${{ needs.prepare-build.outputs.talk_id }}/${{ needs.prepare-build.outputs.video_slug }}/work/timecodes.txt

            EXACT format — one line per block, IDs in ascending order, no other text:
            #<id> | HH:MM:SS,mmm | HH:MM:SS,mmm

            Rules:
            - WHISPER mode: every block in uk_blocks.json must appear exactly once
            - EN-SRT mode: emit only blocks that have an EN SRT counterpart; IDs may skip but must be strictly ascending
            - Timecodes must be non-overlapping
            - Do NOT write block text, only the id and timecodes
            - Do NOT use TodoWrite

            ROLE: you are a TRANSLATION ALIGNER, not a coder.
            Match UK block meaning directly to words in timing.json (whisper)
            or blocks in timing.json (en-srt), then Write the timecodes line
            by line. Do NOT author a Python/Bash script that computes or
            distributes timecodes procedurally — proportional distribution,
            weight-by-char allocation, paragraph-range guessing, or any
            other mechanical assignment is banned. Each timecode must come
            from a specific matched word or block in timing.json, read with
            Read and emitted with Write. If you find yourself about to run
            Bash with multi-line Python that computes start/end times, stop
            and match each UK block by meaning instead.

      - name: Validate timecodes format
        env:
          TALK_ID: ${{ needs.prepare-build.outputs.talk_id }}
          VIDEO_SLUG: ${{ needs.prepare-build.outputs.video_slug }}
          TIMING_SOURCE: ${{ needs.prepare-build.outputs.timing_source }}
        run: |
          N=$(python3 -c "import json; print(len(json.load(open('talks/${TALK_ID}/${VIDEO_SLUG}/work/uk_blocks.json'))))")
          # WHISPER mode: every uk_block must have a timecode — exact count.
          # EN-SRT mode: Opus is allowed to SKIP UK blocks with no EN
          # counterpart, so count is an upper bound; IDs must still be
          # strictly ascending.
          if [ "$TIMING_SOURCE" = "en-srt" ]; then
            python -m tools.validate_artifacts \
              --timecodes "talks/${TALK_ID}/${VIDEO_SLUG}/work/timecodes.txt" \
              --max-blocks "${N}" \
              --allow-skipped-ids
          else
            python -m tools.validate_artifacts \
              --timecodes "talks/${TALK_ID}/${VIDEO_SLUG}/work/timecodes.txt" \
              --expected-blocks "${N}"
          fi

      - name: Assemble and build SRT
        env:
          TALK_ID: ${{ needs.prepare-build.outputs.talk_id }}
          VIDEO_SLUG: ${{ needs.prepare-build.outputs.video_slug }}
        run: |
          python -m tools.build_map assemble \
            --talk-dir "talks/${TALK_ID}" \
            --video-slug "${VIDEO_SLUG}"

      - name: Optimize SRT
        env:
          TALK_ID: ${{ needs.prepare-build.outputs.talk_id }}
          VIDEO_SLUG: ${{ needs.prepare-build.outputs.video_slug }}
        run: |
          python -m tools.optimize_srt \
            --srt "talks/${TALK_ID}/${VIDEO_SLUG}/final/uk.srt" \
            --output "talks/${TALK_ID}/${VIDEO_SLUG}/final/uk.srt" \
            --skip-duration-split \
            --skip-cps-split

      - name: Write primary build manifest
        # Records which mode was used so downstream consumers (golden tests,
        # future reviewers) can apply the same validation rules the
        # pipeline used. See `tests/test_golden_talks.py` for how this is
        # consumed.
        env:
          TALK_ID: ${{ needs.prepare-build.outputs.talk_id }}
          VIDEO_SLUG: ${{ needs.prepare-build.outputs.video_slug }}
          TIMING_SOURCE: ${{ needs.prepare-build.outputs.timing_source }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python3 <<'PYEOF'
          import os
          import yaml
          from datetime import datetime, timezone

          talk = os.environ["TALK_ID"]
          video = os.environ["VIDEO_SLUG"]
          mode = os.environ["TIMING_SOURCE"]  # whisper | en-srt
          manifest = {
              "role": "primary",
              "mode": mode,
              "built_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "run_id": int(os.environ["RUN_ID"]),
          }
          path = f"talks/{talk}/{video}/final/build_manifest.yaml"
          with open(path, "w") as f:
              yaml.dump(manifest, f, default_flow_style=False, sort_keys=False)
          print(f"  wrote {path} (mode={mode})")
          PYEOF

      - name: Build secondary-video SRTs
        # Secondary videos (same talk, different recording) get their uk.srt
        # from the primary's output — a simple time offset when the two en.srt
        # files are identical-text-different-timing, or word-level re-alignment
        # (resync_srt) when the secondary covers a SUBSET of the primary's
        # content (e.g. only the English speech portion of a puja). This needs
        # source/en.srt on BOTH the primary and the secondary; a secondary
        # without en.srt (raw recording, no English subtitles) is skipped, not
        # a failure. See tools/build_secondary_srts.py.
        env:
          TALK_ID: ${{ needs.prepare-build.outputs.talk_id }}
          VIDEO_SLUG: ${{ needs.prepare-build.outputs.video_slug }}
        run: |
          python -m tools.build_secondary_srts \
            --talk-dir "talks/${TALK_ID}" \
            --primary-slug "${VIDEO_SLUG}" \
            --run-id "${{ github.run_id }}"

      - name: Validate subtitles
        env:
          TALK_ID: ${{ needs.prepare-build.outputs.talk_id }}
          VIDEO_SLUG: ${{ needs.prepare-build.outputs.video_slug }}
        run: |
          TALK="talks/${TALK_ID}"
          FIRST="${VIDEO_SLUG}"

          python3 -c "
          import yaml
          with open('${TALK}/meta.yaml') as f:
            meta = yaml.safe_load(f)
          for v in meta['videos']:
            print(v['slug'])
          " | while read slug; do
            VIDEO="${TALK}/${slug}"
            if [ ! -f "${VIDEO}/final/uk.srt" ]; then
              echo "SKIP ${slug}: no uk.srt"
              continue
            fi
            EXTRA_FLAGS=""
            if [ "${slug}" != "${FIRST}" ]; then
              # Secondary is derivative: text comes from primary (already
              # passed text check), timing comes from offset/resync (may
              # produce occasional high-CPS blocks unfixable without silence).
              EXTRA_FLAGS="--skip-text-check --skip-time-check --skip-cps-check"
            elif [ "${{ needs.prepare-build.outputs.timing_source }}" = "en-srt" ]; then
              # Primary in en-srt mode: Opus is instructed to DROP UK blocks
              # with no EN counterpart (trailing signatures, stage
              # directions), so transcript ↔ SRT word equality no longer
              # holds. Replace text-preservation with a block-count sanity
              # check against EN SRT; time range still enforced.
              EXTRA_FLAGS="--skip-text-check --compare-block-count"
            fi
            # Anchor matches the builder's timing source:
            #   whisper mode → --whisper-json (whisper words)
            #   en-srt mode  → --en-srt       (EN SRT blocks)
            ANCHOR_FLAG=""
            if [ "${{ needs.prepare-build.outputs.timing_source }}" = "en-srt" ]; then
              ANCHOR_FLAG="--en-srt ${VIDEO}/source/en.srt"
            else
              ANCHOR_FLAG="--whisper-json ${VIDEO}/source/whisper.json"
            fi
            python -m tools.validate_subtitles \
              --srt "${VIDEO}/final/uk.srt" \
              --transcript "${TALK}/transcript_uk.txt" \
              ${ANCHOR_FLAG} \
              --skip-duration-check \
              ${EXTRA_FLAGS} \
              --report "${VIDEO}/final/report.txt"
          done

      - name: Upload build artifacts
        if: "!cancelled()"
        uses: actions/upload-artifact@v7
        with:
          retention-days: 7
          name: subtitles__${{ needs.prepare-build.outputs.talk_id }}${{ inputs.dry_run_tag }}
          path: |
            talks/${{ needs.prepare-build.outputs.talk_id }}/*/work/timecodes.txt
            talks/${{ needs.prepare-build.outputs.talk_id }}/*/final/uk.srt
            talks/${{ needs.prepare-build.outputs.talk_id }}/*/final/report.txt
            talks/${{ needs.prepare-build.outputs.talk_id }}/*/final/build_report.txt
            talks/${{ needs.prepare-build.outputs.talk_id }}/*/final/build_manifest.yaml


  # Dry-run verifier — replaces the commit job when inputs.dry_run is true.
  # Asserts produced artifacts match the snapshot baseline but does NOT push.
  verify-dryrun:
    needs: [discover, translate-and-review, build-timecodes]
    if: |
      inputs.dry_run == true && always() && !cancelled() &&
      needs.build-timecodes.result == 'success' &&
      (needs.translate-and-review.result == 'success' || needs.translate-and-review.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt

      - name: Download subtitle artifacts
        uses: actions/download-artifact@v8
        with:
          name: subtitles__${{ needs.discover.outputs.talk_id }}${{ inputs.dry_run_tag }}
          path: /tmp/subtitles

      - name: Stage artifacts back under talks/
        env:
          TALK_ID: ${{ needs.discover.outputs.talk_id }}
        run: |
          find /tmp/subtitles \( -name 'uk.srt' -o -name 'timecodes.txt' \) | while read src; do
            rel=$(echo "$src" | grep -o '[^/]*/\(work\|final\)/[^/]*$' || true)
            if [ -n "$rel" ]; then
              dest="talks/${TALK_ID}/${rel}"
              mkdir -p "$(dirname "$dest")"
              cp "$src" "$dest"
              echo "  -> $dest"
            fi
          done

      - name: Verify against snapshot
        env:
          TALK_ID: ${{ needs.discover.outputs.talk_id }}
        run: |
          # The pipeline builds only the PRIMARY video (most whisper words)
          # and generates offset-video SRTs via offset_srt apply. Verify only
          # the primary — offset videos are trivially derived.
          primary=$(python3 -c "
          import json, os, yaml
          talk=os.environ['TALK_ID']
          with open(f'talks/{talk}/meta.yaml') as f:
              meta=yaml.safe_load(f)
          best_slug, best_words = None, -1
          for v in meta['videos']:
              wpath=f'talks/{talk}/{v[\"slug\"]}/source/whisper.json'
              try:
                  with open(wpath) as wf:
                      segs=json.load(wf)['segments']
                  nw=sum(len(s.get('words', [])) for s in segs)
              except Exception:
                  nw=0
              if nw>best_words:
                  best_words, best_slug = nw, v['slug']
          print(best_slug)
          ")
          echo "Primary video: ${primary}"
          snap="tests/fixtures/pipeline_snapshots/${TALK_ID}/${primary}"
          if [ ! -d "$snap" ]; then
            echo "::error::no snapshot for ${TALK_ID}/${primary}"
            exit 1
          fi
          python -m tools.verify_snapshot \
            --talk-dir "talks/${TALK_ID}" \
            --video-slug "${primary}" \
            --snapshot "${snap}"

  # Single commit job – collects all artifacts and pushes
  commit:
    needs: [discover, translate-and-review, build-timecodes]
    # commit runs after any build path completes; skipped for dry-runs.
    if: |
      inputs.dry_run != true && always() &&
      !cancelled() &&
      (needs.build-timecodes.result == 'success' || needs.build-timecodes.result == 'failure' || needs.build-timecodes.result == 'skipped') &&
      (needs.translate-and-review.result == 'success' || needs.translate-and-review.result == 'failure' || needs.translate-and-review.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Pull latest
        run: git pull --rebase

      - name: Download translation artifacts
        if: needs.translate-and-review.result == 'success' || needs.translate-and-review.result == 'failure'
        uses: actions/download-artifact@v8
        with:
          name: translation__${{ needs.discover.outputs.talk_id }}${{ inputs.dry_run_tag }}
          path: /tmp/translation

      - name: Download subtitle artifacts
        # Upload runs on !cancelled(), so partial artifacts exist even when
        # build-timecodes failed at a late step (e.g. validate_subtitles).
        if: needs.build-timecodes.result != 'skipped'
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: subtitles__${{ needs.discover.outputs.talk_id }}${{ inputs.dry_run_tag }}
          path: /tmp/subtitles

      - name: Verify subtitle artifacts present
        # When build-timecodes SUCCEEDED but nothing landed in /tmp/subtitles
        # (e.g. artifact download transient failure), fail loudly — we must
        # not silently commit translation-only while claiming success.
        # On build-timecodes FAILURE, partial or empty artifacts are expected,
        # so this guard is scoped to success.
        if: needs.build-timecodes.result == 'success'
        run: |
          if [ ! -d /tmp/subtitles ] || [ -z "$(find /tmp/subtitles -type f -print -quit 2>/dev/null)" ]; then
            echo "::error::build-timecodes succeeded but no subtitle artifacts were downloaded"
            exit 1
          fi

      - name: Place artifacts into talk directories
        # BUILD_RESULT gates the subtitle copy — skip when validation failed
        # so the broken SRT does not end up on main as the next run's
        # baseline. Translation artifacts are always copied so progress
        # survives a build failure. `needs.build-timecodes.result` is a
        # workflow-controlled enum (success/failure/cancelled/skipped),
        # not user input — using `env:` anyway as the safe default.
        env:
          BUILD_RESULT: ${{ needs.build-timecodes.result }}
          TALK_ID: ${{ needs.discover.outputs.talk_id }}
        run: |
          # Translation
          if [ -d /tmp/translation ]; then
            echo "=== Translation artifacts ==="
            find /tmp/translation -type f
            for f in transcript_uk.txt review_report.md; do
              src=$(find /tmp/translation -name "$f" -type f | head -1)
              if [ -n "$src" ]; then
                cp "$src" "talks/$TALK_ID/$f"
                echo "  -> talks/$TALK_ID/$f"
              fi
            done
          fi

          # Subtitles — only when build-timecodes succeeded (validation passed).
          if [ "$BUILD_RESULT" != "success" ]; then
            echo "=== Subtitle artifacts SKIPPED (build-timecodes=$BUILD_RESULT) ==="
          elif [ -d /tmp/subtitles ]; then
            echo "=== Subtitle artifacts ==="
            find /tmp/subtitles -type f
            find /tmp/subtitles \( -name "uk.srt" -o -name "timecodes.txt" -o -name "report.txt" -o -name "build_report.txt" \) | while read src; do
              # Preserve video slug subdirectory
              rel=$(echo "$src" | grep -o '[^/]*/\(work\|final\)/[^/]*$')
              if [ -n "$rel" ]; then
                dest="talks/$TALK_ID/$rel"
                mkdir -p "$(dirname "$dest")"
                cp "$src" "$dest"
                echo "  -> $dest"
              fi
            done
          fi

      - name: Commit via PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          .github/scripts/bot-pr.sh \
            bot/pipeline \
            "Build subtitles (full pipeline)" \
            "talks/*/transcript_uk.txt" "talks/*/review_report.md" \
            "talks/*/glossary.json" \
            "talks/*/*/work/timecodes.txt" \
            "talks/*/*/final/uk.srt" "talks/*/*/final/report.txt" \
            "talks/*/*/final/build_report.txt" \
            "talks/*/*/final/build_manifest.yaml"

      - name: Create review tracking issue
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TALK_ID: ${{ needs.discover.outputs.talk_id }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
        run: |
          # Derive the Pages base from the repo context so a transfer needs no
          # edit. GitHub Pages host is the lowercased owner.
          OWNER_LC=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          SPA_BASE="https://${OWNER_LC}.github.io/${REPO#*/}"
          EXISTING=$(gh issue list --search "Review: $TALK_ID in:title" --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "Review issue #$EXISTING already exists — resetting to pending"
            gh issue reopen "$EXISTING"
            gh issue edit "$EXISTING" --remove-label "review:approved,review:in-progress" --add-label "review:pending,talk-review"
          else
            META_TITLE=$(python3 -c "import yaml; print(yaml.safe_load(open('talks/$TALK_ID/meta.yaml'))['title'])" 2>/dev/null || echo "$TALK_ID")
            gh issue create \
              --title "Review: $TALK_ID" \
              --label "review:pending,talk-review" \
              --body "$(cat <<ISSUEEOF
          ## $META_TITLE

          | | |
          |---|---|
          | Talk | \`$TALK_ID\` |
          | Review | [Open in SPA]($SPA_BASE/#/review/$TALK_ID) |
          | Transcript | [\`transcript_uk.txt\`](https://github.com/$REPO/blob/main/talks/$TALK_ID/transcript_uk.txt) |

          ### How to review
          1. Open the [SPA review page]($SPA_BASE/#/review/$TALK_ID)
          2. Assign yourself to this issue to claim the review
          3. Watch the video with subtitles, review the translation
          4. Report problems as comments on this issue
          5. When done, add the \`review:approved\` label
          ISSUEEOF
          )"
          fi

  sync-status:
    needs: commit
    # !cancelled() opts out of the implicit success() check that otherwise
    # propagates `skipped` from transitive needs (e.g. whisper) through
    # commit's always() and would skip this job even when commit succeeded.
    if: ${{ !cancelled() && needs.commit.result == 'success' }}
    uses: ./.github/workflows/sync-review-status.yml
    permissions:
      contents: write
      issues: write
      pull-requests: write
