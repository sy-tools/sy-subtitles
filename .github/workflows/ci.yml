name: CI

on:
  push:
    branches: [main]
    paths:
      - 'tools/**'
      - 'tests/**'
      - 'site/**'
      - 'requirements*.txt'
      - 'ruff.toml'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'tools/**'
      - 'tests/**'
      - 'site/**'
      - 'requirements*.txt'
      - 'ruff.toml'
      - '.github/workflows/**'

# Least-privilege default for every job (all are read-only lint/test jobs).
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install ruff==0.15.18
      - run: ruff check tools/ tests/
      - run: ruff format --check tools/ tests/

      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: 1.7.12
        run: |
          curl -sSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin actionlint
          actionlint -version

      - name: Lint workflows (actionlint)
        run: actionlint -ignore 'shellcheck reported issue.*:info:' .github/workflows/*.yml

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: playwright install chromium --with-deps
      - run: pytest tests/ -n auto --tb=short

  test-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: node --test tests/test_*.js
