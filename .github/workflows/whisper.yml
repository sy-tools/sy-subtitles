name: Whisper Speech Detection

on:
  workflow_dispatch:
    inputs:
      talk_id:
        description: 'Talk directory name (e.g., 1983-07-24_guru-puja). Leave empty to auto-discover all pending.'
        required: false
        type: string
      force:
        description: 'Re-run even if whisper.json already exists'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      talk_id:
        description: 'Talk directory name'
        required: true
        type: string
      force:
        description: 'Re-run even if whisper.json already exists'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      has_jobs: ${{ steps.build.outputs.has_jobs }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Build video matrix
        id: build
        env:
          INPUT_TALK_ID: ${{ inputs.talk_id }}
          INPUT_FORCE: ${{ inputs.force }}
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import yaml

          from tools.workflow_validation import (
              InvalidWorkflowInput,
              die,
              validate_talk_id,
              validate_video_ref,
              validate_video_slug,
          )

          talk_id_input = os.environ.get("INPUT_TALK_ID", "").strip()
          force = os.environ.get("INPUT_FORCE", "").strip().lower() == "true"
          if talk_id_input:
              try:
                  validate_talk_id(talk_id_input)
              except InvalidWorkflowInput as e:
                  die(str(e))

          # Find meta.yaml files
          if talk_id_input:
              meta_paths = [f"talks/{talk_id_input}/meta.yaml"]
          else:
              meta_paths = sorted(
                  f"talks/{d}/meta.yaml"
                  for d in os.listdir("talks")
                  if os.path.isfile(f"talks/{d}/meta.yaml")
              )

          matrix = []
          for meta_path in meta_paths:
              if not os.path.isfile(meta_path):
                  print(f"WARNING: {meta_path} not found, skipping")
                  continue

              talk_id = meta_path.split("/")[1]
              try:
                  validate_talk_id(talk_id)
              except InvalidWorkflowInput as e:
                  die(str(e))
              with open(meta_path) as f:
                  meta = yaml.safe_load(f)

              videos = meta.get("videos", [])
              for video in videos:
                  slug = video["slug"]
                  # Links are stored obfuscated as video_ref; pass the ref
                  # through the matrix (decode happens at the yt-dlp step) so no
                  # plaintext URL lands in the public Actions logs.
                  video_ref = video.get("video_ref", "")
                  if not video_ref:
                      continue
                  try:
                      validate_video_slug(slug)
                      validate_video_ref(video_ref)
                  except InvalidWorkflowInput as e:
                      die(f"{meta_path}: {e}")
                  whisper_path = f"talks/{talk_id}/{slug}/source/whisper.json"

                  if os.path.isfile(whisper_path) and not force:
                      print(f"SKIP: {whisper_path} already exists")
                      continue

                  matrix.append({
                      "talk_id": talk_id,
                      "video_slug": slug,
                      "video_ref": video_ref,
                  })
                  print(f"QUEUE: {talk_id}/{slug}")

          has_jobs = "true" if matrix else "false"
          print(f"\nTotal jobs: {len(matrix)}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps({'include': matrix})}\n")
              f.write(f"has_jobs={has_jobs}\n")
          PYEOF

  whisper:
    needs: discover
    if: needs.discover.outputs.has_jobs == 'true'
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 3
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    env:
      TALK_ID: ${{ matrix.talk_id }}
      VIDEO_SLUG: ${{ matrix.video_slug }}
      VIDEO_REF: ${{ matrix.video_ref }}
    steps:
      - uses: actions/checkout@v6

      - name: Validate matrix values
        run: |
          python3 -m tools.workflow_validation_cli \
            --talk-id "$TALK_ID" \
            --video-slug "$VIDEO_SLUG" \
            --video-ref "$VIDEO_REF"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-whisper-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-whisper-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install faster-whisper>=1.2.1

      - name: Cache Whisper model
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface/hub
          key: faster-whisper-medium

      - name: Download video (temporary)
        run: |
          # Decode the obfuscated video_ref at the last moment and mask the
          # plaintext URL from the logs.
          VIMEO_URL=$(python3 -m tools.vimeo_codec decode "$VIDEO_REF")
          echo "::add-mask::$VIMEO_URL"
          mkdir -p /tmp/whisper_work
          yt-dlp \
            --referer "https://www.amruta.org/" \
            -o "/tmp/whisper_work/video.mp4" \
            "$VIMEO_URL"

      - name: Run Whisper
        run: |
          mkdir -p "talks/${TALK_ID}/${VIDEO_SLUG}/source"
          LANG_FLAG=$(python3 -c "
          import os, yaml
          with open('talks/' + os.environ['TALK_ID'] + '/meta.yaml') as f:
            meta = yaml.safe_load(f)
          if meta.get('other_languages'):
            print('')
          else:
            print('--language ' + meta.get('language', 'en'))
          ")
          echo "Whisper language flag: ${LANG_FLAG:-auto-detect}"
          python -m tools.whisper_run \
            --video /tmp/whisper_work/video.mp4 \
            --output "talks/${TALK_ID}/${VIDEO_SLUG}/source/whisper.json" \
            --model medium \
            $LANG_FLAG

      - name: Validate whisper.json contract
        run: |
          python -m tools.validate_artifacts \
            --whisper "talks/${TALK_ID}/${VIDEO_SLUG}/source/whisper.json"

      - name: Cleanup video
        if: always()
        run: rm -rf /tmp/whisper_work

      - name: Upload whisper artifact
        uses: actions/upload-artifact@v7
        with:
          name: whisper__${{ matrix.talk_id }}__${{ matrix.video_slug }}
          path: talks/${{ matrix.talk_id }}/${{ matrix.video_slug }}/source/whisper.json

  commit:
    needs: [discover, whisper]
    if: needs.discover.outputs.has_jobs == 'true' && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all whisper artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: whisper__*
          merge-multiple: false
          path: whisper-downloads

      - name: Place artifacts into talk directories
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "=== Downloaded artifacts ==="
          find whisper-downloads -type f 2>/dev/null || echo "No files found"
          ls -d whisper-downloads/whisper__*/ 2>/dev/null || echo "No whisper__ subdirs"

          placed=0
          # Strategy 1: subdirectories (merge-multiple: false creates dirs)
          for dir in whisper-downloads/whisper__*/; do
            [ -d "$dir" ] || continue
            name="$(basename "$dir")"
            rest="${name#whisper__}"
            video_slug="${rest##*__}"
            talk_id="${rest%__*}"
            if [ -f "$dir/whisper.json" ]; then
              dest="talks/${talk_id}/${video_slug}/source"
              mkdir -p "$dest"
              cp "$dir/whisper.json" "$dest/whisper.json"
              echo "Placed: $dest/whisper.json"
              placed=$((placed + 1))
            fi
          done

          # Strategy 2: flat extraction fallback — download-artifact@v6 sometimes
          # extracts a single artifact flat (no subdir). Recover names via gh API.
          if [ "$placed" -eq 0 ] && [ -f "whisper-downloads/whisper.json" ]; then
            echo "WARN: flat extraction detected, resolving via gh API"
            artifact_name=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/artifacts" \
              --jq '.artifacts[] | select(.name | startswith("whisper__")) | .name' | head -1)
            echo "Artifact name: $artifact_name"
            if [ -n "$artifact_name" ]; then
              rest="${artifact_name#whisper__}"
              video_slug="${rest##*__}"
              talk_id="${rest%__*}"
              dest="talks/${talk_id}/${video_slug}/source"
              mkdir -p "$dest"
              cp "whisper-downloads/whisper.json" "$dest/whisper.json"
              echo "Placed (flat fallback): $dest/whisper.json"
              placed=$((placed + 1))
            else
              echo "ERROR: could not resolve artifact name from gh API"
            fi
          fi

          echo "Total placed: $placed"

      - name: Commit via PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          .github/scripts/bot-pr.sh bot/whisper "Add Whisper data" "talks/*/*/source/whisper.json"
