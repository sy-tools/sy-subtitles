name: New Talk Setup
run-name: "New talk: ${{ github.event.pull_request.title }}"

# Pushes via GITHUB_TOKEN do not trigger workflows — no recursion risk.

on:
  pull_request:
    branches: [main]
    paths:
      - 'talks/*/meta.yaml'

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── Detect new meta.yaml files ──────────────────────────────────
  detect:
    runs-on: ubuntu-latest
    if: github.event.action == 'opened' || github.event.action == 'synchronize'
    outputs:
      has_new: ${{ steps.detect.outputs.has_new }}
      metas: ${{ steps.detect.outputs.metas }}
      whisper_matrix: ${{ steps.detect.outputs.whisper_matrix }}
      has_whisper: ${{ steps.detect.outputs.has_whisper }}
    env:
      PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Detect new talks
        id: detect
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import subprocess

          import yaml

          from tools.workflow_validation import (
              InvalidWorkflowInput,
              die,
              validate_talk_id,
              validate_video_ref,
              validate_video_slug,
          )

          base = os.environ["PR_BASE_SHA"]
          head = os.environ["PR_HEAD_SHA"]

          result = subprocess.run(
              ["git", "diff", "--name-only", "--diff-filter=A", base, head],
              capture_output=True, text=True, check=True
          )

          new_metas = [
              f for f in result.stdout.strip().split("\n")
              if f.startswith("talks/") and f.endswith("/meta.yaml")
          ]

          if not new_metas:
              print("No new meta.yaml files found")
              with open(os.environ["GITHUB_OUTPUT"], "a") as out:
                  out.write("has_new=false\n")
                  out.write("has_whisper=false\n")
          else:
              # Build whisper matrix: one entry per video
              whisper_matrix = []
              for meta_path in new_metas:
                  talk_dir = os.path.dirname(meta_path)
                  talk_id = os.path.basename(talk_dir)
                  try:
                      validate_talk_id(talk_id)
                  except InvalidWorkflowInput as e:
                      die(str(e))
                  with open(meta_path) as f:
                      meta = yaml.safe_load(f)
                  for video in meta.get("videos", []):
                      # Links are stored obfuscated as video_ref; pass the ref
                      # through the matrix (decoded at the yt-dlp step) so no
                      # plaintext URL lands in the public Actions logs.
                      video_ref = video.get("video_ref", "")
                      if not video_ref:
                          continue
                      slug = video.get("slug", "")
                      try:
                          validate_video_slug(slug)
                          validate_video_ref(video_ref)
                      except InvalidWorkflowInput as e:
                          die(f"{meta_path}: {e}")
                      whisper_path = f"{talk_dir}/{slug}/source/whisper.json"
                      if os.path.exists(whisper_path):
                          print(f"SKIP whisper: {whisper_path} exists")
                          continue
                      whisper_matrix.append({
                          "talk_id": talk_id,
                          "video_slug": slug,
                          "video_ref": video_ref,
                      })
                      print(f"QUEUE whisper: {talk_id}/{slug}")

              print(f"\nNew talks: {new_metas}")
              print(f"Whisper jobs: {len(whisper_matrix)}")

              with open(os.environ["GITHUB_OUTPUT"], "a") as out:
                  out.write("has_new=true\n")
                  out.write(f"metas={json.dumps(new_metas)}\n")
                  out.write(f"has_whisper={'true' if whisper_matrix else 'false'}\n")
                  out.write(f"whisper_matrix={json.dumps({'include': whisper_matrix})}\n")
          PYEOF

  # ── Setup: transcript, dirs, EN SRT, label ──────────────────────
  setup:
    needs: detect
    if: needs.detect.outputs.has_new == 'true'
    runs-on: ubuntu-latest
    env:
      NEW_METAS: ${{ needs.detect.outputs.metas }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install -r requirements.txt yt-dlp

      - name: Process new talks
        run: |
          python3 << 'PYEOF'
          import base64
          import json
          import os
          import re
          from urllib.parse import urlparse, urlunparse

          import yaml

          from tools.download import AmrutaDownloader
          from tools.vimeo_codec import decode_video_ref

          metas = json.loads(os.environ["NEW_METAS"])
          downloader = AmrutaDownloader()

          for meta_path in metas:
              talk_dir = os.path.dirname(meta_path)
              talk_id = os.path.basename(talk_dir)
              print(f"\n{'='*50}")
              print(f"  {talk_id}")
              print(f"{'='*50}")

              with open(meta_path) as f:
                  meta = yaml.safe_load(f)

              dirty = False  # track if meta.yaml needs rewriting

              # 1. Clean amruta_url: strip query params
              url = meta.get("amruta_url", "")
              if url:
                  parsed = urlparse(url)
                  clean_url = urlunparse(parsed._replace(query="", fragment=""))
                  if clean_url != url:
                      meta["amruta_url"] = clean_url
                      dirty = True
                      print(f"  Cleaned URL: {url} → {clean_url}")

              # 2. Extract transcript from base64, prepend header
              b64 = meta.get("transcript_en_base64", "").strip()
              if b64:
                  try:
                      body = base64.b64decode(b64).decode("utf-8")

                      # Build header matching download.py format:
                      # "8 May 1988\nSahasrara Puja\nFregene (Italy)\nTalk Language: English | ..."
                      from datetime import datetime
                      date_str = datetime.strptime(meta["date"], "%Y-%m-%d").strftime("%-d %B %Y")
                      location = meta.get("location", "")
                      lang_code = meta.get("language", "en")
                      lang_name = {"en": "English", "hi": "Hindi", "mr": "Marathi",
                                   "fr": "French", "it": "Italian"}.get(lang_code, lang_code.title())
                      header = f"{date_str}\n{meta['title']}\n"
                      if location:
                          header += f"{location}\n"
                      header += f"Talk Language: {lang_name} | Transcript ({lang_name})\n"

                      # Normalize: collapse 3+ newlines to single paragraph break
                      import re as _re
                      body = _re.sub(r'\n{3,}', '\n', body)

                      # Only prepend if header not already present
                      if "Talk Language:" not in body[:500]:
                          transcript = header + "\n" + body
                      else:
                          transcript = body

                      transcript_path = os.path.join(talk_dir, "transcript_en.txt")
                      with open(transcript_path, "w") as f:
                          f.write(transcript)
                      print(f"  Extracted transcript: {len(transcript)} chars")
                      del meta["transcript_en_base64"]
                      dirty = True
                  except Exception as e:
                      print(f"  WARN: Failed to decode transcript: {e}")

              # 3. Rewrite meta.yaml if changed
              if dirty:
                  with open(meta_path, "w") as f:
                      yaml.dump(meta, f, default_flow_style=False, allow_unicode=True, sort_keys=False)
                  print("  Updated meta.yaml")

              # 4. Create video directories
              for video in meta.get("videos", []):
                  slug = video["slug"]
                  for subdir in ["source", "work", "final"]:
                      dirpath = os.path.join(talk_dir, slug, subdir)
                      os.makedirs(dirpath, exist_ok=True)
                      if not os.listdir(dirpath):
                          with open(os.path.join(dirpath, ".gitkeep"), "w") as f:
                              pass
                  print(f"  Created dirs: {slug}")

              # 5. Download EN subtitles (Vimeo first, then YouTube search)
              for video in meta.get("videos", []):
                  slug = video["slug"]
                  video_ref = video.get("video_ref", "")
                  vimeo_url = decode_video_ref(video_ref) if video_ref else ""
                  source_dir = os.path.join(talk_dir, slug, "source")
                  en_srt = os.path.join(source_dir, "en.srt")

                  if os.path.exists(en_srt):
                      print(f"  {slug}: en.srt exists — skip")
                      continue

                  if not vimeo_url:
                      print(f"  {slug}: no video_ref — skip SRT")
                      continue

                  # Use download.py's proven download method
                  print(f"  Downloading EN SRT for {slug}")
                  try:
                      srt_files = downloader.download_vimeo_subs(vimeo_url, source_dir)
                      if srt_files:
                          print(f"  {slug}: saved {[os.path.basename(f) for f in srt_files]}")
                      else:
                          print(f"  {slug}: no EN subtitles on Vimeo")
                  except Exception as e:
                      print(f"  {slug}: Vimeo SRT failed: {e}")
          PYEOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add talks/
          git diff --cached --quiet && { echo "No changes to commit"; exit 0; }
          git commit -m "Setup new talk: extract transcript, create dirs, download SRT"
          git pull --rebase
          git push

      - name: Add new-talk label
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create new-talk --description "PR adds a new talk" --color 0E8A16 2>/dev/null || true
          gh pr edit "$PR_NUMBER" --add-label new-talk

  # ── Whisper: download video, run speech detection (parallel) ─────
  whisper:
    needs: detect
    if: needs.detect.outputs.has_whisper == 'true'
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 3
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.whisper_matrix) }}
    env:
      TALK_ID: ${{ matrix.talk_id }}
      VIDEO_SLUG: ${{ matrix.video_slug }}
      VIDEO_REF: ${{ matrix.video_ref }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-whisper-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-whisper-

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install -r requirements.txt
          pip install faster-whisper>=1.2.1 yt-dlp

      - name: Cache Whisper model
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface/hub
          key: faster-whisper-medium

      - name: Validate matrix values
        run: |
          python3 -m tools.workflow_validation_cli \
            --talk-id "$TALK_ID" \
            --video-slug "$VIDEO_SLUG" \
            --video-ref "$VIDEO_REF"

      - name: Download video
        run: |
          # Decode the obfuscated video_ref at the last moment and mask the
          # plaintext URL from the logs.
          VIMEO_URL=$(python3 -m tools.vimeo_codec decode "$VIDEO_REF")
          echo "::add-mask::$VIMEO_URL"
          mkdir -p /tmp/whisper_work
          yt-dlp --referer "https://www.amruta.org/" -o "/tmp/whisper_work/video.mp4" "$VIMEO_URL"

      - name: Run Whisper
        run: |
          LANG_FLAG=$(python3 -c "
          import os, yaml
          with open('talks/' + os.environ['TALK_ID'] + '/meta.yaml') as f:
            meta = yaml.safe_load(f)
          if meta.get('other_languages'):
            print('')
          else:
            print('--language ' + meta.get('language', 'en'))
          ")
          mkdir -p "talks/${TALK_ID}/${VIDEO_SLUG}/source"
          python -m tools.whisper_run \
            --video /tmp/whisper_work/video.mp4 \
            --output "talks/${TALK_ID}/${VIDEO_SLUG}/source/whisper.json" \
            --model medium \
            $LANG_FLAG

      - name: Cleanup video
        if: always()
        run: rm -rf /tmp/whisper_work

      - name: Upload whisper artifact
        uses: actions/upload-artifact@v7
        with:
          name: whisper__${{ matrix.talk_id }}__${{ matrix.video_slug }}
          path: talks/${{ matrix.talk_id }}/${{ matrix.video_slug }}/source/whisper.json

  # ── Whisper commit: collect artifacts, push ─────────────────────
  whisper-commit:
    needs: [detect, whisper]
    if: needs.detect.outputs.has_whisper == 'true' && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Download whisper artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: whisper__*
          merge-multiple: false
          path: whisper-downloads

      - name: Place artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          placed=0
          # Strategy 1: subdirectories (merge-multiple: false creates dirs)
          for dir in whisper-downloads/whisper__*/; do
            [ -d "$dir" ] || continue
            name="$(basename "$dir")"
            rest="${name#whisper__}"
            video_slug="${rest##*__}"
            talk_id="${rest%__*}"
            if [ -f "$dir/whisper.json" ]; then
              dest="talks/${talk_id}/${video_slug}/source"
              mkdir -p "$dest"
              cp "$dir/whisper.json" "$dest/whisper.json"
              echo "Placed: $dest/whisper.json"
              placed=$((placed + 1))
            fi
          done

          # Strategy 2: flat extraction fallback — download-artifact@v6 sometimes
          # extracts a single artifact flat (no subdir). Recover names via gh API.
          if [ "$placed" -eq 0 ] && [ -f "whisper-downloads/whisper.json" ]; then
            echo "WARN: flat extraction detected, resolving via gh API"
            artifact_name=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/artifacts" \
              --jq '.artifacts[] | select(.name | startswith("whisper__")) | .name' | head -1)
            echo "Artifact name: $artifact_name"
            if [ -n "$artifact_name" ]; then
              rest="${artifact_name#whisper__}"
              video_slug="${rest##*__}"
              talk_id="${rest%__*}"
              dest="talks/${talk_id}/${video_slug}/source"
              mkdir -p "$dest"
              cp "whisper-downloads/whisper.json" "$dest/whisper.json"
              echo "Placed (flat fallback): $dest/whisper.json"
              placed=$((placed + 1))
            else
              echo "ERROR: could not resolve artifact name from gh API"
            fi
          fi

          echo "Total placed: $placed"

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add talks/*/*/source/whisper.json
          git diff --cached --quiet && { echo "No whisper changes"; exit 0; }
          git commit -m "Add Whisper speech detection data"
          git pull --rebase
          git push
