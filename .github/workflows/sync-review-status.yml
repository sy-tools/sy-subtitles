name: Sync Review Status

on:
  issues:
    types: [labeled, unlabeled, assigned, unassigned, closed, reopened]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    # Serialize syncs: rapid issue events (e.g. claiming two talks seconds
    # apart) used to spawn parallel runs that raced bot-pr.sh from the same
    # base into duplicate stuck PRs (#728/#729). Job-level on purpose —
    # workflow-level concurrency is ignored when this file runs via
    # workflow_call. cancel-in-progress stays false: an in-flight sync is a
    # multi-step sequence (label edits → regenerate → PR → merge) and must
    # finish; new runs queue behind it.
    concurrency:
      group: review-status-sync
      cancel-in-progress: false
    # For 'unlabeled' the issue's label list reflects the state AFTER removal,
    # so removing the last review:* label would skip the sync — also check the
    # removed label itself (github.event.label.name).
    if: >
      github.event_name != 'issues' ||
      contains(join(github.event.issue.labels.*.name, ','), 'review:') ||
      startsWith(github.event.label.name, 'review:')
    steps:
      # Always branch off the live main tip, not the inherited SHA. When this
      # workflow runs via `workflow_call` from subtitle-pipeline.yml, the default
      # checkout uses the caller's `github.sha` — the pipeline's dispatch SHA,
      # which can be ~1h stale once the long translate/build jobs finish.
      # sync-review-status.py regenerates review-status.json by merging entries
      # preserved from the on-disk file, so a stale base yields stale content;
      # bot-pr.sh then opens a PR off that stale base and merges into a moved
      # main, producing a 3-way conflict whenever another status update landed
      # during the run. Pinning `ref: main` bases the regenerated file on the
      # current tip and lets the PR merge cleanly.
      - uses: actions/checkout@v7
        with:
          ref: main

      - name: Auto-update labels on assign/unassign/close/reopen
        if: >
          github.event_name == 'issues' && (
            github.event.action == 'assigned' ||
            github.event.action == 'unassigned' ||
            github.event.action == 'closed' ||
            github.event.action == 'reopened'
          )
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ github.event.issue.number }}
          ACTION: ${{ github.event.action }}
        run: |
          if [ "$ACTION" = "assigned" ]; then
            gh issue edit "$ISSUE" --remove-label "review:pending" --add-label "review:in-progress"
          elif [ "$ACTION" = "unassigned" ]; then
            ASSIGNEES=$(gh issue view "$ISSUE" --json assignees --jq '.assignees | length')
            if [ "$ASSIGNEES" = "0" ]; then
              gh issue edit "$ISSUE" --remove-label "review:in-progress" --add-label "review:pending"
            fi
          elif [ "$ACTION" = "closed" ]; then
            gh issue edit "$ISSUE" --remove-label "review:pending,review:in-progress" --add-label "review:approved"
          elif [ "$ACTION" = "reopened" ]; then
            gh issue edit "$ISSUE" --remove-label "review:approved" --add-label "review:pending"
          fi

      - name: Generate review-status.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/sync-review-status.py

      - name: Commit via PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: .github/scripts/bot-pr.sh bot/review-status "Update review status" review-status.json