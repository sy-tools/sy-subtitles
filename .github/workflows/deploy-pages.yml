name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Stamp build info
        run: |
          DEPLOY_DATE=$(date -u +%Y-%m-%d)
          # App-shell version: combined blob SHAs of site/index.html + site/js/*.js
          # from the committed tree (matches what the Trees API returns to the
          # running SPA). Computed before the sed below, so the stamp is not part
          # of the hashed input. See tools/compute_shell_version.sh.
          SHELL_SHA=$(bash tools/compute_shell_version.sh)
          sed -i "s/var APP_DEPLOY_DATE = '';/var APP_DEPLOY_DATE = '${DEPLOY_DATE}';/" site/index.html
          sed -i "s/var APP_DEPLOY_SHA = '';/var APP_DEPLOY_SHA = '${SHELL_SHA}';/" site/index.html
          echo "Deploy: date=$DEPLOY_DATE shell=$SHELL_SHA"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v5
